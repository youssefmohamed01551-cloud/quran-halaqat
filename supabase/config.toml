project_id = "quran-halaqat-platform"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "com.halaqat.app://login-callback"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:8080"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "10MiB"

[edge_runtime]
enabled = true
policy = "per_worker"
